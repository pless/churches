<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>European Religious Buildings — Interior Explorer</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --church:#3b6ea5; --chapel:#4f9d69; --monastery:#9c6cae; --mosque:#e1812c;
    --synagogue:#2aa3a3; --temple:#d6618f; --other:#9aa0a6;
    --bg:#11161c; --panel:#1a212a; --line:#2c3742; --txt:#e7edf3; --mut:#9fb0bf;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--txt);overflow:hidden}
  #app{display:grid;grid-template-columns:1fr 420px;height:100%}
  #map{height:100%}
  /* ---- right pane ---- */
  #pane{background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;min-width:0}
  #pane header{padding:14px 16px;border-bottom:1px solid var(--line)}
  #pane h1{font-size:15px;margin:0 0 6px}
  #sub{font-size:12px;color:var(--mut);line-height:1.5}
  #sub a{color:#7fb2ff;text-decoration:none}
  #grid{flex:1;overflow:auto;padding:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-content:start}
  #grid img{width:100%;height:120px;object-fit:cover;border-radius:6px;background:#0c1117;cursor:zoom-in;
    border:1px solid var(--line);transition:transform .08s}
  #grid img:hover{transform:scale(1.02);border-color:#5b7689}
  .empty{color:var(--mut);font-size:13px;padding:24px 16px;line-height:1.6}
  .chip{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#0c1117}
  /* ---- map overlays ---- */
  .card{position:absolute;background:rgba(20,26,33,.92);border:1px solid var(--line);border-radius:10px;
    backdrop-filter:blur(6px);font-size:12px}
  #legend{left:12px;bottom:24px;padding:10px 12px}
  #legend b{display:block;margin-bottom:6px;font-size:11px;letter-spacing:.04em;color:var(--mut);text-transform:uppercase}
  .lgi{display:flex;align-items:center;gap:7px;margin:3px 0;cursor:pointer;user-select:none}
  .lgi.off{opacity:.35}
  .dot{width:11px;height:11px;border-radius:50%}
  #ctrl{left:12px;top:12px;padding:10px 12px;max-width:300px}
  #ctrl b{font-size:13px}
  #ctrl .row{margin-top:8px;display:flex;gap:8px;align-items:center}
  select,button{background:#0f151b;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px}
  button{cursor:pointer}
  #ctrl .stat{color:var(--mut);font-size:11px;margin-top:8px;line-height:1.5}
  label.tog{display:flex;gap:7px;align-items:center;cursor:pointer;color:var(--mut)}
  /* ---- lightbox ---- */
  #lb{position:fixed;inset:0;background:rgba(5,8,11,.93);display:none;z-index:50;
    align-items:center;justify-content:center;flex-direction:column}
  #lb.on{display:flex}
  #lb img{max-width:92vw;max-height:82vh;object-fit:contain;border-radius:6px}
  #lbcap{color:var(--mut);font-size:12px;margin-top:10px;max-width:80vw;text-align:center}
  #lbcap a{color:#7fb2ff}
  #lb .nav{position:absolute;top:0;bottom:0;width:18vw;display:flex;align-items:center;justify-content:center;
    font-size:40px;color:#fff8;cursor:pointer;user-select:none;z-index:1}
  #lb .nav:hover{color:#fff}
  #lb .prev{left:0}#lb .next{right:0}
  #lb .x{position:absolute;top:16px;right:22px;font-size:26px;color:#fff8;cursor:pointer;
    z-index:3;width:44px;height:44px;display:flex;align-items:center;justify-content:center}
  #lb .x:hover{color:#fff}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <aside id="pane">
    <header><h1 id="title">Select a building</h1><div id="sub" class="empty"
      style="padding:0">Click any colored dot on the map. Images load on demand from Wikimedia Commons —
      nothing is downloaded until you select a building.</div></header>
    <div id="grid"></div>
  </aside>
</div>

<div id="ctrl" class="card">
  <b>🏛 Interior Explorer</b>
  <div class="row">
    <span style="color:var(--mut)">Fly to</span>
    <select id="country"><option value="">— all Europe —</option></select>
  </div>
  <div class="row">
    <span style="color:var(--mut)">Min photos</span>
    <input type="range" id="minN" min="1" max="20" value="4" style="flex:1">
    <span id="minNval" style="color:var(--txt);min-width:16px;text-align:right">4</span>
  </div>
  <div class="row"><label class="tog"><input type="checkbox" id="showAll"> show all buildings (faint)</label></div>
  <div class="stat" id="stat">loading…</div>
</div>

<div id="legend" class="card"><b>Building type — click to filter</b><div id="legitems"></div></div>

<div id="lb">
  <div class="x" onclick="closeLB()">✕</div>
  <div class="nav prev" onclick="step(-1)">‹</div>
  <div class="nav next" onclick="step(1)">›</div>
  <img id="lbimg" src="">
  <div id="lbcap"></div>
</div>

<script>
const CATS = [["church","Church"],["chapel","Chapel"],["monastery","Monastery/Abbey"],
  ["mosque","Mosque"],["synagogue","Synagogue"],["temple","Temple"],["other","Other"]];
const COLOR = {church:"#3b6ea5",chapel:"#4f9d69",monastery:"#9c6cae",mosque:"#e1812c",
  synagogue:"#2aa3a3",temple:"#d6618f",other:"#9aa0a6"};
const cssColor = c => COLOR[c] || COLOR.other;
const active = new Set(CATS.map(c=>c[0]));        // which categories are shown
let minN = 4;                                     // min interior photos to show
const shardCache = {};                            // cc -> {qid:[urls]}
let current = {imgs:[], i:0};                      // lightbox state

const U = e => (e && typeof e==="object") ? e.u : e;          // shard entry -> image URL
const isFlickr = u => u.includes("staticflickr");
const thumb = (u,w)=> isFlickr(u) ? u : u + (u.includes("?")?"&":"?") + "width="+w;
const commonsPage = u => u.replace("/wiki/Special:FilePath/","/wiki/File:");
const fileName = u => decodeURIComponent(u.split("Special:FilePath/")[1]||"").replace(/_/g," ");
// caption/attribution for one shard entry (Flickr object -> owner+license+page; else Commons)
function capHTML(e){
  if(e && typeof e==="object")
    return `${e.o?("© "+e.o+" · "):""}${e.l||"Flickr"} · <a href="${e.p||'#'}" target="_blank">Flickr ↗</a>`;
  return `${fileName(e)} · <a href="${commonsPage(e)}" target="_blank">view on Commons</a>`;
}

const map = new maplibregl.Map({
  container:"map",
  style:{
    version:8,
    glyphs:"https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
    sources:{carto:{type:"raster",tileSize:256,
      tiles:["https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
             "https://b.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png",
             "https://c.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"],
      attribution:"© OpenStreetMap, © CARTO · imagery: Wikimedia Commons, DPLA & Flickr (rights per item)"}},
    layers:[{id:"bg",type:"raster",source:"carto"}]
  },
  center:[16,22], zoom:2.7, maxZoom:19   // global: Europe + Africa in view
});
map.addControl(new maplibregl.NavigationControl({showCompass:false}),"bottom-right");
window._map = map;
map.on("error", e=>console.error("MAPERR:", e && e.error && e.error.message));

// build legend
const li = document.getElementById("legitems");
CATS.forEach(([k,name])=>{
  const d=document.createElement("div"); d.className="lgi"; d.dataset.k=k;
  d.innerHTML=`<span class="dot" style="background:${cssColor(k)}"></span>${name}`;
  d.onclick=()=>{ active.has(k)?active.delete(k):active.add(k); d.classList.toggle("off"); applyFilter(); };
  li.appendChild(d);
});
// note explaining the dimmed / amber-ringed points
const note=document.createElement("div");
note.style.cssText="margin-top:7px;padding-top:7px;border-top:1px solid var(--line);font-size:11px;color:var(--mut);line-height:1.5";
note.innerHTML=`<span class="dot" style="background:#7a8894;box-shadow:0 0 0 2.5px #ffb020"></span>`+
  `amber halo = discovered from Commons<br>imagery (not in Wikidata)`;
li.appendChild(note);
// Filter the SOURCE data (not just a layer) so the CLUSTERS reflect both the
// active category set and the min-photos threshold, then re-cluster.
function applyFilter(){
  if(!window.BDATA || !map.getSource("b")) return;
  const feats = window.BDATA.features.filter(
    f => active.has(f.properties.c) && f.properties.n >= minN);
  map.getSource("b").setData({type:"FeatureCollection", features:feats});
  const mc=document.getElementById("matchcount"); if(mc) mc.textContent=feats.length.toLocaleString();
  const ml=document.getElementById("minNlbl");    if(ml) ml.textContent=minN;
}

const catColorExpr = ["match",["get","c"],
  ...CATS.flatMap(([k])=>[k,cssColor(k)]), "#9aa0a6"];

// NB: set up the clustered source on the first 'idle', NOT on 'load'. Adding a
// clustered geojson source during the initial load tick wedges its clustering
// worker (it produces 0 features and the map renders empty). By 'idle' the map
// has fully settled and the source builds correctly.
function buildBuildings(bdata){
  map.addSource("b",{type:"geojson",data:bdata,
    cluster:true,clusterRadius:50,clusterMaxZoom:12});
  map.addLayer({id:"cl",type:"circle",source:"b",filter:["has","point_count"],
    paint:{"circle-color":"rgba(59,110,165,0.85)",
      "circle-radius":["step",["get","point_count"],12,50,16,200,21,1000,28],
      "circle-stroke-width":1.5,"circle-stroke-color":"#0c1117"}});
  map.addLayer({id:"cl-n",type:"symbol",source:"b",filter:["has","point_count"],
    layout:{"text-field":["get","point_count_abbreviated"],"text-size":11,"text-font":["Noto Sans Regular"]},
    paint:{"text-color":"#fff"}});
  map.addLayer({id:"pts",type:"circle",source:"b",filter:["!",["has","point_count"]],
    paint:{"circle-color":catColorExpr,
      "circle-radius":["interpolate",["linear"],["zoom"],6,3.2,12,5,16,8],
      // k=0 => building not in Wikidata (discovered from Commons imagery): give it
      // a thick bright-amber halo so it stands out clearly from Wikidata points.
      "circle-opacity":["case",["==",["get","k"],0],0.9,1],
      "circle-stroke-width":["interpolate",["linear"],["zoom"],
        6,["case",["==",["get","k"],0],1.6,0.8],
        16,["case",["==",["get","k"],0],3.5,1]],
      "circle-stroke-color":["case",["==",["get","k"],0],"#ffb020","#0c1117"]}});
  applyFilter();
}

// Load data as soon as the style is ready (not on 'idle', which also waits for
// basemap tiles to settle — a slow/blocked basemap would otherwise stall the
// whole app). The font bug that originally forced 'idle' is fixed.
async function initData(){
  const bdata = await (await fetch("data/buildings_interiors.geojson")).json();
  window.BDATA = bdata;
  buildBuildings(bdata);

  const meta = await (await fetch("data/meta.json")).json();
  document.getElementById("stat").innerHTML =
    `showing <b style="color:var(--txt)" id="matchcount">…</b> buildings with ≥<span id="minNlbl">${minN}</span> interior photos`+
    `<br>of ${meta.buildings_with_interiors.toLocaleString()} with photos · ${meta.interior_images.toLocaleString()} images total`;
  applyFilter();   // populate matchcount now that the stat element exists
  const sel=document.getElementById("country");
  meta.countries.forEach(cc=>{const o=document.createElement("option");o.value=cc;o.textContent=cc;sel.appendChild(o);});
}
if(map.loaded()) initData(); else map.on("load", initData);

// cluster click -> zoom in
map.on("click","cl", async (e)=>{
  const f=map.queryRenderedFeatures(e.point,{layers:["cl"]})[0];
  const z=await map.getSource("b").getClusterExpansionZoom(f.properties.cluster_id);
  map.easeTo({center:f.geometry.coordinates,zoom:z});
});
// hover
const pop=new maplibregl.Popup({closeButton:false,closeOnClick:false,offset:10});
map.on("mouseenter","pts",e=>{map.getCanvas().style.cursor="pointer";});
map.on("mousemove","pts",e=>{
  const p=e.features[0].properties;
  pop.setLngLat(e.features[0].geometry.coordinates)
     .setHTML(`<div style="font-size:12px;color:#111"><b>${p.l}</b><br>${p.n} interior image${p.n>1?"s":""}</div>`)
     .addTo(map);
});
map.on("mouseleave","pts",()=>{map.getCanvas().style.cursor="";pop.remove();});
// select
map.on("click","pts",e=>selectBuilding(e.features[0].properties));

async function selectBuilding(p){
  document.getElementById("title").textContent = p.l;
  const cat = CATS.find(c=>c[0]===p.c);
  document.getElementById("sub").className="";
  const known = p.k===1 && /^Q\d/.test(p.q||"");
  const srcLink = p.src==="flickr"
    ? `<span style="color:#e0a53a">via Flickr · CC (credit per image)</span>`
    : p.src==="dpla"
    ? `<a href="${p.src_url||'https://dp.la'}" target="_blank">via DPLA</a>`
      + (p.inst?` · ${p.inst}`:``)
      + (p.rights?` · <span style="color:var(--mut)" title="${(p.rights+'').replace(/"/g,'')}">${(p.rights+'').slice(0,44)}</span>`:``)
    : known
    ? `<a href="https://www.wikidata.org/wiki/${p.q}" target="_blank">Wikidata</a>`
    : `<a href="https://commons.wikimedia.org/w/index.php?search=${encodeURIComponent(p.l)}&title=Special:MediaSearch&type=image" target="_blank">Commons</a> · <span style="color:#e0a53a">discovered from imagery</span>`;
  const approx = p.a===1
    ? ` · <span style="color:#e0a53a" title="Placed from the town/city in the name — the pin is town-level, not the exact building">◎ approx. location (town-level)</span>`
    : "";
  document.getElementById("sub").innerHTML =
    `<span class="chip" style="background:${cssColor(p.c)}">${cat?cat[1]:p.c}</span> · ${p.cc} · `+
    `${p.n} interior image${p.n>1?"s":""} · ${srcLink}${approx}`;
  const grid=document.getElementById("grid");
  grid.innerHTML='<div class="empty">loading images…</div>';
  if(!shardCache[p.cc]){
    try{ shardCache[p.cc]=await (await fetch(`data/interiors/${p.cc}.json`)).json(); }
    catch{ shardCache[p.cc]={}; }
  }
  const urls = shardCache[p.cc][p.q] || [];
  current.imgs = urls;
  grid.innerHTML="";
  if(!urls.length){ grid.innerHTML='<div class="empty">No images found in shard.</div>'; return; }
  urls.forEach((entry,idx)=>{
    const u=U(entry);
    const img=new Image();
    img.loading="lazy"; img.src=thumb(u,300);
    img.title=(entry&&typeof entry==="object")?(entry.o?("© "+entry.o):"Flickr"):fileName(u);
    img.onclick=()=>openLB(idx);
    grid.appendChild(img);
  });
}

// lightbox
function openLB(i){current.i=i;renderLB();document.getElementById("lb").classList.add("on");}
function closeLB(){document.getElementById("lb").classList.remove("on");}
function step(d){current.i=(current.i+d+current.imgs.length)%current.imgs.length;renderLB();}
function renderLB(){
  const e=current.imgs[current.i];
  document.getElementById("lbimg").src=thumb(U(e),1400);
  document.getElementById("lbcap").innerHTML=
    `${current.i+1} / ${current.imgs.length} — ${capHTML(e)}`;
}
document.addEventListener("keydown",e=>{
  if(!document.getElementById("lb").classList.contains("on"))return;
  if(e.key==="Escape")closeLB(); if(e.key==="ArrowRight")step(1); if(e.key==="ArrowLeft")step(-1);
});

// country fly-to
document.getElementById("country").onchange=e=>{
  const cc=e.target.value; if(!cc||!window.BDATA)return;
  const pts=window.BDATA.features.filter(f=>f.properties.cc===cc);
  if(!pts.length)return;
  const b=new maplibregl.LngLatBounds();
  pts.forEach(f=>b.extend(f.geometry.coordinates));
  map.fitBounds(b,{padding:60,maxZoom:13});
};

// min interior-photos threshold
document.getElementById("minN").oninput=e=>{
  minN=+e.target.value;
  document.getElementById("minNval").textContent=minN;
  applyFilter();
};

// faint "all buildings" context layer (lazy)
document.getElementById("showAll").onchange=e=>{
  if(e.target.checked){
    if(!map.getSource("all")){
      map.addSource("all",{type:"geojson",data:new URL("data/buildings_all.geojson",location.href).href,cluster:true,clusterRadius:60,clusterMaxZoom:11});
      map.addLayer({id:"all-pts",type:"circle",source:"all",filter:["!",["has","point_count"]],
        paint:{"circle-color":"#6b7a88","circle-opacity":.35,"circle-radius":2}},"cl");
    } else { map.setLayoutProperty("all-pts","visibility","visible"); }
  } else if(map.getLayer("all-pts")){ map.setLayoutProperty("all-pts","visibility","none"); }
};
</script>
</body>
</html>
